---
name: group-sync-core

"on":
  workflow_call:
    inputs:
      shared-repo:
        required: true
        type: string
      shared-ref:
        required: true
        type: string
      config-repo:
        required: true
        type: string
      config-ref:
        required: true
        type: string
      config-path:
        required: true
        type: string
      target-token-secret:
        required: true
        type: string
      projects-only:
        required: false
        type: boolean
        default: false
      emit-parquet:
        required: false
        type: boolean
        default: false
      bws-version:
        required: false
        type: string
        default: ""
      bws-sha256:
        required: false
        type: string
        default: ""
    secrets:
      BWS_ACCESS_TOKEN:
        required: true
      BWS_PROJECT_ID:
        required: true

permissions: {}

jobs:
  bootstrap:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    permissions:
      contents: read
    outputs:
      batch-size: ${{ steps.config_meta.outputs.batch-size }}
      discover-matrix: ${{ steps.discovery_matrix.outputs.matrix }}
      discover-secret-list: ${{ steps.config_meta.outputs.discover-secret-list }}
      max-parallel: ${{ steps.config_meta.outputs.max-parallel }}
      mirror-secret-list: ${{ steps.config_meta.outputs.mirror-secret-list }}
      workflow-deadline-epoch: ${{ steps.workflow_deadline.outputs.workflow-deadline-epoch }}
    steps:
      - name: Validate workflow inputs
        shell: bash
        env:
          CONFIG_PATH: ${{ inputs.config-path }}
          TARGET_TOKEN_SECRET: ${{ inputs.target-token-secret }}
          SHARED_REF: ${{ inputs.shared-ref }}
          SHARED_REPO: ${{ inputs.shared-repo }}
          CONFIG_REPO: ${{ inputs.config-repo }}
          CONFIG_REF: ${{ inputs.config-ref }}
        run: |
          set -euo pipefail
          case "${CONFIG_PATH}" in
            ""|*..*|/*)
              printf '%s\n' "invalid config-path: ${CONFIG_PATH}" >&2
              exit 1
              ;;
          esac
          case "${TARGET_TOKEN_SECRET}" in
            GL_PAT_GROUP_ANDROID_SVC|GL_PAT_GROUP_CHROMIUM_SVC|GL_PAT_GROUP_DEBIAN_SVC|GL_PAT_GROUP_FREEDESKTOP_SVC|GL_PAT_GROUP_GNOME_SVC|GL_PAT_GROUP_HASHICORP_SVC|GL_PAT_GROUP_KALI_SVC|GL_PAT_GROUP_KDE_SVC|GL_PAT_GROUP_MICROSOFT_SVC|GL_PAT_GROUP_NVIDIA_SVC|GL_PAT_GROUP_OPENAI_SVC|GL_PAT_GROUP_PROJ_SVC|GL_PAT_GROUP_SMALL_SVC)
              ;;
            *)
              printf 'invalid target-token-secret: %s\n' \
                "${TARGET_TOKEN_SECRET}" >&2
              exit 1
              ;;
          esac
          case "${CONFIG_PATH}" in
            glab-groups-android)
              expected_token_secret="GL_PAT_GROUP_ANDROID_SVC"
              ;;
            glab-groups-chromium)
              expected_token_secret="GL_PAT_GROUP_CHROMIUM_SVC"
              ;;
            glab-groups-kali)
              expected_token_secret="GL_PAT_GROUP_KALI_SVC"
              ;;
            glab-groups-debian)
              expected_token_secret="GL_PAT_GROUP_DEBIAN_SVC"
              ;;
            glab-groups-freedesktop)
              expected_token_secret="GL_PAT_GROUP_FREEDESKTOP_SVC"
              ;;
            glab-groups-small)
              expected_token_secret="GL_PAT_GROUP_SMALL_SVC"
              ;;
            glab-groups-openai)
              expected_token_secret="GL_PAT_GROUP_OPENAI_SVC"
              ;;
            glab-groups-nvidia)
              expected_token_secret="GL_PAT_GROUP_NVIDIA_SVC"
              ;;
            glab-groups-kde)
              expected_token_secret="GL_PAT_GROUP_KDE_SVC"
              ;;
            glab-groups-gnome)
              expected_token_secret="GL_PAT_GROUP_GNOME_SVC"
              ;;
            glab-groups-hashicorp)
              expected_token_secret="GL_PAT_GROUP_HASHICORP_SVC"
              ;;
            glab-groups-microsoft)
              expected_token_secret="GL_PAT_GROUP_MICROSOFT_SVC"
              ;;
            glab-groups-projects)
              expected_token_secret="GL_PAT_GROUP_PROJ_SVC"
              ;;
            *)
              printf 'unsupported config-path: %s\n' "${CONFIG_PATH}" >&2
              exit 1
              ;;
          esac
          if [ "${TARGET_TOKEN_SECRET}" != "${expected_token_secret}" ]; then
            printf '%s\n' "target-token-secret does not match config-path" >&2
            exit 1
          fi
          if [ "${SHARED_REPO}" != "shared-common/glab-groups-shared" ]; then
            printf 'invalid shared-repo: %s\n' "${SHARED_REPO}" >&2
            exit 1
          fi
          if [ "${CONFIG_REPO}" != "shared-common/gh-actions-cfg" ]; then
            printf 'invalid config-repo: %s\n' "${CONFIG_REPO}" >&2
            exit 1
          fi
          for ref_name in SHARED_REF CONFIG_REF; do
            ref_value="${!ref_name}"
            case "${ref_value}" in
              mcr/main|mcr/staging|mcr/release|v[0-9]*)
                continue
                ;;
            esac
            if [[ ! "${ref_value}" =~ ^[0-9a-f]{40}$ ]]; then
              printf 'invalid %s: %s\n' "${ref_name}" "${ref_value}" >&2
              exit 1
            fi
          done

      - name: Checkout shared workflow repository
        # actions/checkout v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: ${{ inputs.shared-repo }}
          ref: ${{ inputs.shared-ref }}
          path: shared
          persist-credentials: false

      - name: Checkout shared config repository
        # actions/checkout v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: ${{ inputs.config-repo }}
          ref: ${{ inputs.config-ref }}
          path: gh-actions-cfg
          persist-credentials: false

      - name: Compute workflow deadline
        id: workflow_deadline
        shell: bash
        run: |
          set -euo pipefail
          deadline_epoch="$(( $(date +%s) + 350 * 60 ))"
          printf 'workflow-deadline-epoch=%s\n' "${deadline_epoch}" >> "${GITHUB_OUTPUT}"

      - name: Resolve config meta
        id: config_meta
        shell: bash
        env:
          CONFIG_DIR: gh-actions-cfg/${{ inputs.config-path }}
          PROJECTS_ONLY: ${{ inputs.projects-only }}
          TARGET_TOKEN_SECRET: ${{ inputs.target-token-secret }}
        run: |
          set -euo pipefail
          perl -I shared/lib -MGlabGroups=load_config_dir - "${CONFIG_DIR}" "${TARGET_TOKEN_SECRET}" "${PROJECTS_ONLY}" "${GITHUB_OUTPUT}" <<'PERL'
          use strict;
          use warnings;

          my ( $config_dir, $target_token_secret, $projects_only, $github_output ) = @ARGV;
          my $config = load_config_dir(
              $config_dir,
              {
                  allow_empty => ( $projects_only eq "true" ? 1 : 0 ),
                  projects_only => ( $projects_only eq "true" ? 1 : 0 ),
              },
          );

          my $needs_github_source_auth = 0;
          for my $namespace ( @{ $config->{namespaces} || [] } ) {
              my $source_url = $namespace->{source_group_url} || "";
              if ( $source_url =~ m{\Ahttps://github\.com/} ) {
                  $needs_github_source_auth = 1;
              }
          }
          for my $project ( @{ $config->{projects} || [] } ) {
              my $source_url = $project->{source_project_url} || "";
              if ( $source_url =~ m{\Ahttps://github\.com/} ) {
                  $needs_github_source_auth = 1;
              }
          }

          my @secret_names = (
              "GIT_BRANCH_GLAB_FORKS",
              "GL_BASE_URL",
              $target_token_secret,
          );
          my @discover_secret_names;
          if ($needs_github_source_auth) {
              push @secret_names, "GH_ORG_READ_APP_ID", "GH_ORG_READ_APP_INSTALL_ID", "GH_ORG_READ_APP_PEM";
              push @discover_secret_names, "GH_ORG_READ_APP_ID", "GH_ORG_READ_APP_INSTALL_ID", "GH_ORG_READ_APP_PEM";
          }
          my $batch_size = $config->{defaults}->{batch_size};
          my $max_parallel = $config->{defaults}->{max_parallel};
          my $discovery_units = scalar( @{ $config->{projects} || [] } );
          for my $namespace ( @{ $config->{namespaces} || [] } ) {
              my $source_group_paths = $namespace->{source_group_paths};
              $discovery_units += ref($source_group_paths) eq "ARRAY" && @{$source_group_paths}
                ? scalar @{$source_group_paths}
                : 1;
          }
          defined $batch_size or die "config defaults.batch_size is required\n";
          defined $max_parallel or die "config defaults.max_parallel is required\n";

          open( my $fh, ">>:encoding(UTF-8)", $github_output )
            or die "unable to append to \$GITHUB_OUTPUT: $github_output\n";
          print {$fh} "discover-secret-list=", join( ",", @discover_secret_names ), "\n";
          print {$fh} "discover-units=$discovery_units\n";
          print {$fh} "batch-size=$batch_size\n";
          print {$fh} "max-parallel=$max_parallel\n";
          print {$fh} "mirror-secret-list=", join( ",", @secret_names ), "\n";
          close $fh;
          PERL

      - name: Build discovery matrix
        id: discovery_matrix
        shell: bash
        env:
          DISCOVER_UNITS: ${{ steps.config_meta.outputs.discover-units }}
        run: |
          set -euo pipefail
          python3 - <<'PY' >> "${GITHUB_OUTPUT}"
          import json
          import os

          total_units = int(os.environ["DISCOVER_UNITS"])
          if total_units < 0:
              raise SystemExit("discover unit count must not be negative")
          max_matrix_jobs = 250
          min_discovery_jobs = 10
          if total_units == 0:
              job_count = 1
          else:
              job_count = min(max(total_units, min_discovery_jobs), max_matrix_jobs)
          include = [
              {
                  "shard_index": index,
                  "unit_limit": 0,
                  "unit_start": index,
                  "unit_stride": job_count,
              }
              for index in range(job_count)
          ]
          matrix = json.dumps({"include": include}, separators=(",", ":"))
          print(f"matrix={matrix}")
          PY

  discover:
    needs: bootstrap
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    permissions:
      contents: read
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix: ${{ fromJSON(needs.bootstrap.outputs.discover-matrix) }}
    steps:
      - name: Checkout shared workflow repository
        # actions/checkout v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: ${{ inputs.shared-repo }}
          ref: ${{ inputs.shared-ref }}
          path: shared
          persist-credentials: false

      - name: Checkout shared config repository
        # actions/checkout v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: ${{ inputs.config-repo }}
          ref: ${{ inputs.config-ref }}
          path: gh-actions-cfg
          persist-credentials: false

      - name: Fetch discovery secrets from BWS
        if: ${{ needs.bootstrap.outputs.discover-secret-list != '' }}
        uses: >-
          shared-common/gh-actions-shared/.github/actions/bws-fetch@v0.0.41
        with:
          access-token: ${{ secrets.BWS_ACCESS_TOKEN }}
          project-id: ${{ secrets.BWS_PROJECT_ID }}
          bws-version: ${{ inputs.bws-version }}
          bws-sha256: ${{ inputs.bws-sha256 }}
          secrets: ${{ needs.bootstrap.outputs.discover-secret-list }}
          output-dir: .secrets

      - name: Mask fetched discovery secrets
        if: ${{ needs.bootstrap.outputs.discover-secret-list != '' }}
        shell: bash
        env:
          SECRET_NAMES: ${{ needs.bootstrap.outputs.discover-secret-list }}
        run: |
          set -euo pipefail
          python3 shared/.github/scripts/mask_secret_files.py

      - name: Discover source inventory shard
        shell: bash
        env:
          WORKFLOW_DEADLINE_EPOCH: ${{ needs.bootstrap.outputs.workflow-deadline-epoch }}
        run: |
          set -euo pipefail
          discover_args=()
          if [ "${{ inputs.projects-only }}" = "true" ]; then
            discover_args+=(--projects-only)
          fi
          remaining_seconds="$(( WORKFLOW_DEADLINE_EPOCH - $(date +%s) ))"
          if [ "${remaining_seconds}" -le 0 ]; then
            printf '%s\n' "workflow deadline exceeded before discovery started" >&2
            exit 1
          fi
          timeout --signal=TERM "${remaining_seconds}s" perl shared/.github/scripts/glab_groups.pl \
            discover \
            --config-dir "gh-actions-cfg/${{ inputs.config-path }}" \
            --output "discover-${{ matrix.shard_index }}.json" \
            --unit-start "${{ matrix.unit_start }}" \
            --unit-stride "${{ matrix.unit_stride }}" \
            --unit-limit "${{ matrix.unit_limit }}" \
            "${discover_args[@]}"

      - name: Upload discovery artifact
        # actions/upload-artifact v7.0.1
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: glab-discover-${{ matrix.shard_index }}-${{ github.run_id }}
          if-no-files-found: error
          path: |
            discover-${{ matrix.shard_index }}.json

      - name: Cleanup secrets
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .secrets

  plan:
    needs: [bootstrap, discover]
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    permissions:
      contents: read
    outputs:
      batch-matrix: ${{ steps.batch_matrix.outputs.matrix }}
      batch-size: ${{ steps.plan_meta.outputs.batch-size }}
      max-parallel: ${{ needs.bootstrap.outputs.max-parallel }}
      mirror-secret-list: ${{ needs.bootstrap.outputs.mirror-secret-list }}
      workflow-deadline-epoch: ${{ needs.bootstrap.outputs.workflow-deadline-epoch }}
    steps:
      - name: Checkout shared workflow repository
        # actions/checkout v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: ${{ inputs.shared-repo }}
          ref: ${{ inputs.shared-ref }}
          path: shared
          persist-credentials: false

      - name: Checkout shared config repository
        # actions/checkout v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: ${{ inputs.config-repo }}
          ref: ${{ inputs.config-ref }}
          path: gh-actions-cfg
          persist-credentials: false

      - name: Download discovery artifacts
        # actions/download-artifact v8.0.1
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          pattern: glab-discover-*-${{ github.run_id }}
          path: discover-artifacts
          merge-multiple: true

      - name: Build deterministic plan
        shell: bash
        env:
          BATCH_SIZE: ${{ needs.bootstrap.outputs.batch-size }}
          WORKFLOW_DEADLINE_EPOCH: ${{ needs.bootstrap.outputs.workflow-deadline-epoch }}
        run: |
          set -euo pipefail
          plan_args=()
          if [ "${{ inputs.projects-only }}" = "true" ]; then
            plan_args+=(--projects-only)
          fi
          discover_args=()
          shopt -s nullglob
          for file in discover-artifacts/discover-*.json; do
            discover_args+=(--discover-input "${file}")
          done
          if [ "${#discover_args[@]}" -eq 0 ]; then
            printf '%s\n' "no discovery JSON files found" >&2
            exit 1
          fi
          remaining_seconds="$(( WORKFLOW_DEADLINE_EPOCH - $(date +%s) ))"
          if [ "${remaining_seconds}" -le 0 ]; then
            printf '%s\n' "workflow deadline exceeded before planning started" >&2
            exit 1
          fi
          timeout --signal=TERM "${remaining_seconds}s" perl shared/.github/scripts/glab_groups.pl \
            plan \
            --config-dir "gh-actions-cfg/${{ inputs.config-path }}" \
            --batch-size "${BATCH_SIZE}" \
            --max-batches 250 \
            --discover-output discover.json \
            "${discover_args[@]}" \
            "${plan_args[@]}" \
            --output plan.json \
            --summary plan.md

      - name: Build mirror batch matrix
        id: batch_matrix
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY' >> "${GITHUB_OUTPUT}"
          import json
          from pathlib import Path

          plan = json.loads(Path("plan.json").read_text(encoding="utf-8"))
          total_batches = int(plan.get("total_batches", 0))
          if total_batches < 0:
              raise SystemExit("plan total_batches must not be negative")
          max_matrix_jobs = 250
          job_count = min(max(total_batches, 1), max_matrix_jobs)
          include = [
              {
                  "shard_index": index,
                  "batch_limit": 0,
                  "batch_start": index,
                  "batch_stride": job_count,
              }
              for index in range(job_count)
          ]
          matrix = json.dumps({"include": include}, separators=(",", ":"))
          print(f"matrix={matrix}")
          PY

      - name: Capture plan meta
        id: plan_meta
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY' >> "${GITHUB_OUTPUT}"
          import json
          from pathlib import Path

          plan = json.loads(Path("plan.json").read_text(encoding="utf-8"))
          batch_size = int(plan.get("batch_size", 0))
          if batch_size < 1:
              raise SystemExit("plan batch_size must be greater than zero")
          print(f"batch-size={batch_size}")
          PY

      - name: Publish plan summary
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          def append_line(parts: list[str], line: str) -> None:
              parts.append(f"{line}\n")

          plan = json.loads(Path("plan.json").read_text(encoding="utf-8"))
          counts = plan.get("counts") or {}
          missing_source_groups = [
              item for item in (plan.get("missing_source_groups") or []) if isinstance(item, dict)
          ]
          excluded_source_groups = [
              item for item in (plan.get("excluded_source_groups") or []) if isinstance(item, dict)
          ]

          parts: list[str] = []
          append_line(parts, "## Plan Overview")
          append_line(parts, "")
          append_line(parts, f"- generated_at: {plan.get('generated_at', '')}")
          append_line(parts, f"- total_targets: {plan.get('total_targets', 0)}")
          append_line(parts, f"- total_target_groups: {plan.get('total_groups', 0)}")
          append_line(parts, f"- batch_size: {plan.get('batch_size', 0)}")
          append_line(parts, f"- total_batches: {plan.get('total_batches', 0)}")
          append_line(parts, f"- sync_planned: {counts.get('sync', 0)}")
          append_line(parts, f"- skip_planned: {counts.get('skip', 0)}")
          append_line(parts, f"- fail_planned: {counts.get('fail', 0)}")
          append_line(parts, f"- missing_source_groups: {len(missing_source_groups)}")
          append_line(parts, f"- excluded_source_groups: {len(excluded_source_groups)}")

          with Path(os.environ["GITHUB_STEP_SUMMARY"]).open("a", encoding="utf-8") as handle:
              handle.write("".join(parts))
          PY

      - name: Upload plan artifact
        # actions/upload-artifact v7.0.1
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: glab-groups-plan-${{ github.run_id }}
          if-no-files-found: error
          path: |
            discover.json
            plan.json

  mirror:
    needs: plan
    runs-on: ubuntu-24.04
    timeout-minutes: 350
    permissions:
      contents: read
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(needs.plan.outputs.max-parallel) }}
      matrix: ${{ fromJSON(needs.plan.outputs.batch-matrix) }}
    steps:
      - name: Checkout shared workflow repository
        # actions/checkout v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: ${{ inputs.shared-repo }}
          ref: ${{ inputs.shared-ref }}
          path: shared
          persist-credentials: false

      - name: Download plan artifact
        # actions/download-artifact v8.0.1
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: glab-groups-plan-${{ github.run_id }}
          path: .

      - name: Fetch target secrets from BWS
        uses: >-
          shared-common/gh-actions-shared/.github/actions/bws-fetch@v0.0.41
        with:
          access-token: ${{ secrets.BWS_ACCESS_TOKEN }}
          project-id: ${{ secrets.BWS_PROJECT_ID }}
          bws-version: ${{ inputs.bws-version }}
          bws-sha256: ${{ inputs.bws-sha256 }}
          secrets: ${{ needs.plan.outputs.mirror-secret-list }}
          output-dir: .secrets

      - name: Mask fetched secrets
        shell: bash
        env:
          SECRET_NAMES: ${{ needs.plan.outputs.mirror-secret-list }}
        run: |
          set -euo pipefail
          python3 shared/.github/scripts/mask_secret_files.py

      - name: Mirror selected repositories for batch
        shell: bash
        env:
          GL_TARGET_TOKEN_SECRET_NAME: ${{ inputs.target-token-secret }}
          WORKFLOW_DEADLINE_EPOCH: ${{ needs.plan.outputs.workflow-deadline-epoch }}
        run: |
          set -euo pipefail
          remaining_seconds="$(( WORKFLOW_DEADLINE_EPOCH - $(date +%s) ))"
          if [ "${remaining_seconds}" -le 0 ]; then
            printf '%s\n' "workflow deadline exceeded before mirror started" >&2
            exit 1
          fi
          timeout --signal=TERM "${remaining_seconds}s" perl shared/.github/scripts/glab_groups.pl \
            mirror \
            --plan plan.json \
            --batch-size "${{ needs.plan.outputs.batch-size }}" \
            --batch-start "${{ matrix.batch_start }}" \
            --batch-stride "${{ matrix.batch_stride }}" \
            --batch-limit "${{ matrix.batch_limit }}" \
            --output "results-${{ matrix.shard_index }}.json" \
            --jsonl "results-${{ matrix.shard_index }}.jsonl"

      - name: Publish batch summary
        shell: bash
        env:
          RESULTS_JSON: results-${{ matrix.shard_index }}.json
          SHARD_INDEX: ${{ matrix.shard_index }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          ARCHIVED_REASON = "Archived source repository is excluded from mirroring."
          REFS_MATCHED_REASON = "Selected source refs already match the target repository."

          def append_line(parts: list[str], line: str) -> None:
              parts.append(f"{line}\n")

          def item_detail(item: dict, preferred_field: str | None = None) -> str:
              detail = item.get(preferred_field) if preferred_field else None
              if not detail:
                  detail = item.get("error") or item.get("reason") or "unknown"
              text = str(detail).rstrip()
              return text or "unknown"

          def classify_skipped(items: list[dict]) -> tuple[int, int, list[dict]]:
              archived_skipped = 0
              refs_matched_skipped = 0
              other_skipped: list[dict] = []
              for item in items:
                  reason = item_detail(item, "reason")
                  if reason == ARCHIVED_REASON:
                      archived_skipped += 1
                      continue
                  if reason == REFS_MATCHED_REASON:
                      refs_matched_skipped += 1
                      continue
                  other_skipped.append(item)
              return archived_skipped, refs_matched_skipped, other_skipped

          def append_repo_details(parts: list[str], heading: str, items: list[dict], preferred_field: str | None = None) -> None:
              if not items:
                  return
              append_line(parts, "")
              append_line(parts, f"### {heading}")
              for item in items:
                  target = item.get("target_full_path", "<unknown>")
                  detail = item_detail(item, preferred_field)
                  if "\n" in detail:
                      append_line(parts, f"- `{target}`:")
                      append_line(parts, "```text")
                      parts.append(detail.rstrip("\n") + "\n")
                      append_line(parts, "```")
                  else:
                      append_line(parts, f"- `{target}`: {detail}")

          result_path = Path(os.environ["RESULTS_JSON"])
          shard_index = os.environ["SHARD_INDEX"]
          payload = json.loads(result_path.read_text(encoding="utf-8"))
          counts = payload.get("counts") or {}
          results = payload.get("results") or []
          skipped = [
              item for item in results
              if isinstance(item, dict) and (item.get("status") or "") == "skipped"
          ]
          failed = [
              item for item in results
              if isinstance(item, dict) and (item.get("status") or "") == "failed"
          ]
          archived_skipped, refs_matched_skipped, other_skipped = classify_skipped(skipped)

          parts: list[str] = []
          append_line(parts, f"## Batch Shard {shard_index} Overview")
          append_line(parts, "")
          append_line(parts, f"- processed_batches: {payload.get('processed_batches', 0)}")
          append_line(parts, f"- result_rows: {len(results)}")
          append_line(parts, f"- mirrored: {counts.get('mirrored', 0)}")
          append_line(parts, f"- created_empty: {counts.get('created_empty', 0)}")
          append_line(parts, f"- updated_empty: {counts.get('updated_empty', 0)}")
          append_line(parts, f"- skipped_total: {counts.get('skipped', 0)}")
          append_line(parts, f"- archived_skipped: {archived_skipped}")
          append_line(parts, f"- refs_matched_skipped: {refs_matched_skipped}")
          append_line(parts, f"- other_skipped: {len(other_skipped)}")
          append_line(parts, f"- failed: {counts.get('failed', 0)}")

          append_repo_details(parts, "Other Skipped", other_skipped, "reason")
          append_repo_details(parts, "Failed", failed, "error")

          with Path(os.environ["GITHUB_STEP_SUMMARY"]).open("a", encoding="utf-8") as handle:
              handle.write("".join(parts))
          PY

      - name: Upload batch result artifacts
        # actions/upload-artifact v7.0.1
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: glab-results-${{ matrix.shard_index }}-${{ github.run_id }}
          if-no-files-found: error
          path: |
            results-${{ matrix.shard_index }}.json
            results-${{ matrix.shard_index }}.jsonl

      - name: Cleanup secrets
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .secrets

  report:
    needs: [plan, mirror]
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - name: Checkout shared workflow repository
        # actions/checkout v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: ${{ inputs.shared-repo }}
          ref: ${{ inputs.shared-ref }}
          path: shared
          persist-credentials: false

      - name: Download plan artifact
        # actions/download-artifact v8.0.1
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: glab-groups-plan-${{ github.run_id }}
          path: .

      - name: Download batch result artifacts
        # actions/download-artifact v8.0.1
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          pattern: glab-results-*-${{ github.run_id }}
          path: results-artifacts
          merge-multiple: true

      - name: Build report
        shell: bash
        env:
          WORKFLOW_DEADLINE_EPOCH: ${{ needs.plan.outputs.workflow-deadline-epoch }}
        run: |
          set -euo pipefail
          results_args=()
          shopt -s nullglob
          for file in results-artifacts/results-*.json; do
            results_args+=(--results "${file}")
          done
          if [ "${#results_args[@]}" -eq 0 ]; then
            printf '%s\n' "no batch result JSON files found" >&2
            exit 1
          fi
          remaining_seconds="$(( WORKFLOW_DEADLINE_EPOCH - $(date +%s) ))"
          if [ "${remaining_seconds}" -le 0 ]; then
            printf '%s\n' "workflow deadline exceeded before report build started" >&2
            exit 1
          fi
          timeout --signal=TERM "${remaining_seconds}s" perl shared/.github/scripts/glab_groups.pl \
            report \
            --plan plan.json \
            "${results_args[@]}" \
            --output report.json \
            --summary report.md

      - name: Build analytics outputs
        shell: bash
        env:
          WORKFLOW_DEADLINE_EPOCH: ${{ needs.plan.outputs.workflow-deadline-epoch }}
        run: |
          set -euo pipefail
          jsonl_args=()
          shopt -s nullglob
          for file in results-artifacts/results-*.jsonl; do
            jsonl_args+=(--jsonl "${file}")
          done
          if [ "${#jsonl_args[@]}" -eq 0 ]; then
            printf '%s\n' "no batch result JSONL files found" >&2
            exit 1
          fi
          parquet_args=()
          if [ "${{ inputs.emit-parquet }}" = "true" ]; then
            parquet_args+=(--parquet results.parquet)
          fi
          remaining_seconds="$(( WORKFLOW_DEADLINE_EPOCH - $(date +%s) ))"
          if [ "${remaining_seconds}" -le 0 ]; then
            printf '%s\n' "workflow deadline exceeded before analytics started" >&2
            exit 1
          fi
          timeout --signal=TERM "${remaining_seconds}s" python3 shared/.github/scripts/post_run_analytics.py \
            --report report.json \
            "${jsonl_args[@]}" \
            --csv results.csv \
            --json analytics.json \
            "${parquet_args[@]}"

      - name: Publish markdown summaries
        shell: bash
        env:
          WORKFLOW_DEADLINE_EPOCH: ${{ needs.plan.outputs.workflow-deadline-epoch }}
        run: |
          set -euo pipefail
          remaining_seconds="$(( WORKFLOW_DEADLINE_EPOCH - $(date +%s) ))"
          if [ "${remaining_seconds}" -le 0 ]; then
            printf '%s\n' "workflow deadline exceeded before summary publication started" >&2
            exit 1
          fi
          timeout --signal=TERM "${remaining_seconds}s" python3 - <<'PY'
          import json
          from pathlib import Path

          MAX_SUMMARY_CHARS = 900_000
          import os

          MAX_MISSING_SOURCE_GROUPS = 50
          ARCHIVED_REASON = "Archived source repository is excluded from mirroring."
          REFS_MATCHED_REASON = "Selected source refs already match the target repository."

          def append_line(parts: list[str], line: str) -> None:
              parts.append(f"{line}\n")

          def item_detail(item: dict, preferred_field: str | None = None) -> str:
              detail = item.get(preferred_field) if preferred_field else None
              if not detail:
                  detail = item.get("error") or item.get("reason") or "unknown"
              text = str(detail).rstrip()
              return text or "unknown"

          def classify_skipped(items: list[dict]) -> tuple[int, int, list[dict]]:
              archived_skipped = 0
              refs_matched_skipped = 0
              other_skipped: list[dict] = []
              for item in items:
                  reason = item_detail(item, "reason")
                  if reason == ARCHIVED_REASON:
                      archived_skipped += 1
                      continue
                  if reason == REFS_MATCHED_REASON:
                      refs_matched_skipped += 1
                      continue
                  other_skipped.append(item)
              return archived_skipped, refs_matched_skipped, other_skipped

          def append_items(parts: list[str], heading: str, items: list[dict], preferred_field: str | None = None) -> None:
              selected = [item for item in items if isinstance(item, dict)]
              if not selected:
                  return
              append_line(parts, "")
              append_line(parts, f"### {heading}")
              for item in selected:
                  target = item.get("target_full_path", "<unknown>")
                  detail = item_detail(item, preferred_field)
                  if "\n" in detail:
                      append_line(parts, f"- `{target}`:")
                      append_line(parts, "```text")
                      parts.append(detail.rstrip("\n") + "\n")
                      append_line(parts, "```")
                  else:
                      append_line(parts, f"- `{target}`: {detail}")

          plan = json.loads(Path("plan.json").read_text(encoding="utf-8"))
          report = json.loads(Path("report.json").read_text(encoding="utf-8"))

          plan_counts = plan.get("counts") or {}
          missing_source_groups = [
              item for item in (plan.get("missing_source_groups") or []) if isinstance(item, dict)
          ]
          excluded_source_groups = [
              item for item in (plan.get("excluded_source_groups") or []) if isinstance(item, dict)
          ]
          result_counts = report.get("result_counts") or {}
          results = report.get("results") or []
          skipped = [item for item in results if isinstance(item, dict) and (item.get("status") or "") == "skipped"]
          failed = [item for item in results if isinstance(item, dict) and (item.get("status") or "") == "failed"]
          input_failures = [item for item in (report.get("input_failures") or []) if isinstance(item, dict)]
          archived_skipped, refs_matched_skipped, other_skipped = classify_skipped(skipped)

          parts: list[str] = []
          append_line(parts, "## Workflow Overview")
          append_line(parts, "")
          append_line(parts, f"- plan_generated_at: {plan.get('generated_at', '')}")
          append_line(parts, f"- report_generated_at: {report.get('generated_at', '')}")
          append_line(parts, f"- total_targets: {plan.get('total_targets', 0)}")
          append_line(parts, f"- total_target_groups: {plan.get('total_groups', 0)}")
          append_line(parts, f"- batch_size: {plan.get('batch_size', 0)}")
          append_line(parts, f"- total_batches: {plan.get('total_batches', 0)}")
          append_line(parts, f"- sync_planned: {plan_counts.get('sync', 0)}")
          append_line(parts, f"- skip_planned: {plan_counts.get('skip', 0)}")
          append_line(parts, f"- fail_planned: {plan_counts.get('fail', 0)}")
          append_line(parts, f"- missing_source_groups: {len(missing_source_groups)}")
          append_line(parts, f"- excluded_source_groups: {len(excluded_source_groups)}")
          append_line(parts, f"- mirrored: {result_counts.get('mirrored', 0)}")
          append_line(parts, f"- created_empty: {result_counts.get('created_empty', 0)}")
          append_line(parts, f"- updated_empty: {result_counts.get('updated_empty', 0)}")
          append_line(parts, f"- skipped_total: {result_counts.get('skipped', 0)}")
          append_line(parts, f"- archived_skipped: {archived_skipped}")
          append_line(parts, f"- refs_matched_skipped: {refs_matched_skipped}")
          append_line(parts, f"- other_skipped: {len(other_skipped)}")
          append_line(parts, f"- failed: {result_counts.get('failed', 0)}")
          append_line(parts, f"- result_file_errors: {len(input_failures)}")

          if missing_source_groups:
              append_line(parts, "")
              append_line(parts, "### Missing Source Groups")
              for item in missing_source_groups[:MAX_MISSING_SOURCE_GROUPS]:
                  namespace_name = item.get("namespace_name") or ""
                  source_group_path = item.get("source_group_path") or "<unknown>"
                  base_url = item.get("base_url") or "<unknown>"
                  target_namespace_path = item.get("target_namespace_path") or source_group_path
                  label = f"{namespace_name}: " if namespace_name else ""
                  append_line(
                      parts,
                      f"- `{label}{source_group_path}` from `{base_url}` skipped; target path `{target_namespace_path}` will not be mirrored this run.",
                  )
              if len(missing_source_groups) > MAX_MISSING_SOURCE_GROUPS:
                  append_line(
                          parts,
                          f"- _... {len(missing_source_groups) - MAX_MISSING_SOURCE_GROUPS} additional entries omitted; see workflow artifacts for full JSON outputs._",
                      )

          if excluded_source_groups:
              append_line(parts, "")
              append_line(parts, "### Excluded Source Groups")
              for item in excluded_source_groups[:MAX_MISSING_SOURCE_GROUPS]:
                  namespace_name = item.get("namespace_name") or ""
                  source_group_path = item.get("source_group_path") or "<unknown>"
                  base_url = item.get("base_url") or "<unknown>"
                  target_namespace_path = item.get("target_namespace_path") or source_group_path
                  reason = item.get("reason") or "Excluded source group by config"
                  label = f"{namespace_name}: " if namespace_name else ""
                  append_line(
                      parts,
                      f"- `{label}{source_group_path}` from `{base_url}` skipped by config; target path `{target_namespace_path}` will not be mirrored this run. Reason: {reason}",
                  )
              if len(excluded_source_groups) > MAX_MISSING_SOURCE_GROUPS:
                  append_line(
                          parts,
                          f"- _... {len(excluded_source_groups) - MAX_MISSING_SOURCE_GROUPS} additional entries omitted; see workflow artifacts for full JSON outputs._",
                      )

          append_items(parts, "Result File Errors", input_failures, "error")
          append_items(parts, "Other Skipped", other_skipped, "reason")
          append_items(parts, "Failed", failed, "error")

          text = "".join(parts)
          if len(text) > MAX_SUMMARY_CHARS:
              text = text[:MAX_SUMMARY_CHARS]
              newline = text.rfind("\n")
              if newline > 0:
                  text = text[: newline + 1]
              text += "\n_... truncated in step summary; see workflow artifacts for full JSON outputs._\n"

          with Path(os.environ["GITHUB_STEP_SUMMARY"]).open("a", encoding="utf-8") as handle:
              handle.write(text)
          PY

      - name: Upload run artifacts
        # actions/upload-artifact v7.0.1
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: glab-groups-${{ inputs.config-path }}-${{ github.run_id }}
          if-no-files-found: error
          path: |
            discover.json
            plan.json
            results-artifacts/**
            report.json
            results.csv
            analytics.json
            results.parquet

      - name: Cleanup secrets
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .secrets
