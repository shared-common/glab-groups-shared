---
name: group-sync-core

"on":
  workflow_call:
    inputs:
      shared-repo:
        required: true
        type: string
      shared-ref:
        required: true
        type: string
      config-repo:
        required: true
        type: string
      config-ref:
        required: true
        type: string
      config-path:
        required: true
        type: string
      target-token-secret:
        required: true
        type: string
      batch-size:
        required: false
        type: number
        default: 25
      emit-parquet:
        required: false
        type: boolean
        default: false
      bws-version:
        required: false
        type: string
        default: ""
      bws-sha256:
        required: false
        type: string
        default: ""
    secrets:
      BWS_ACCESS_TOKEN:
        required: true
      BWS_PROJECT_ID:
        required: true

permissions: {}

jobs:
  plan:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    permissions:
      contents: read
    outputs:
      batch-matrix: ${{ steps.batch_matrix.outputs.matrix }}
      needs-github-source-auth: ${{ steps.config_meta.outputs.needs-github-source-auth }}
    steps:
      - name: Validate workflow inputs
        shell: bash
        env:
          CONFIG_PATH: ${{ inputs.config-path }}
          TARGET_TOKEN_SECRET: ${{ inputs.target-token-secret }}
          SHARED_REF: ${{ inputs.shared-ref }}
          SHARED_REPO: ${{ inputs.shared-repo }}
          CONFIG_REPO: ${{ inputs.config-repo }}
          CONFIG_REF: ${{ inputs.config-ref }}
        run: |
          set -euo pipefail
          case "${CONFIG_PATH}" in
            ""|*..*|/*)
              printf '%s\n' "invalid config-path: ${CONFIG_PATH}" >&2
              exit 1
              ;;
          esac
          case "${TARGET_TOKEN_SECRET}" in
            GL_PAT_GROUP_KALI_SVC|GL_PAT_GROUP_DEBIAN_SVC|GL_PAT_GROUP_FREEDESKTOP_SVC|GL_PAT_GROUP_SMALL_SVC|GL_PAT_GROUP_KDE_SVC|GL_PAT_GROUP_GNOME_SVC)
              ;;
            *)
              printf 'invalid target-token-secret: %s\n' \
                "${TARGET_TOKEN_SECRET}" >&2
              exit 1
              ;;
          esac
          case "${CONFIG_PATH}" in
            glab-groups-kali)
              expected_token_secret="GL_PAT_GROUP_KALI_SVC"
              ;;
            glab-groups-debian)
              expected_token_secret="GL_PAT_GROUP_DEBIAN_SVC"
              ;;
            glab-groups-freedesktop)
              expected_token_secret="GL_PAT_GROUP_FREEDESKTOP_SVC"
              ;;
            glab-groups-small)
              expected_token_secret="GL_PAT_GROUP_SMALL_SVC"
              ;;
            glab-groups-kde)
              expected_token_secret="GL_PAT_GROUP_KDE_SVC"
              ;;
            glab-groups-gnome)
              expected_token_secret="GL_PAT_GROUP_GNOME_SVC"
              ;;
            *)
              printf 'unsupported config-path: %s\n' "${CONFIG_PATH}" >&2
              exit 1
              ;;
          esac
          if [ "${TARGET_TOKEN_SECRET}" != "${expected_token_secret}" ]; then
            printf '%s\n' "target-token-secret does not match config-path" >&2
            exit 1
          fi
          for value in \
            "${SHARED_REPO}" \
            "${SHARED_REF}" \
            "${CONFIG_REPO}" \
            "${CONFIG_REF}"
          do
            if [ -z "${value}" ]; then
              printf '%s\n' "shared/config repo inputs must be set" >&2
              exit 1
            fi
          done

      - name: Checkout shared workflow repository
        # actions/checkout v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: ${{ inputs.shared-repo }}
          ref: ${{ inputs.shared-ref }}
          path: shared
          persist-credentials: false

      - name: Checkout shared config repository
        # actions/checkout v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: ${{ inputs.config-repo }}
          ref: ${{ inputs.config-ref }}
          path: gh-actions-cfg
          persist-credentials: false

      - name: Resolve BWS secret list
        id: config_meta
        shell: bash
        env:
          CONFIG_DIR: gh-actions-cfg/${{ inputs.config-path }}
          TARGET_TOKEN_SECRET: ${{ inputs.target-token-secret }}
        run: |
          set -euo pipefail
          python3 - "${CONFIG_DIR}" "${TARGET_TOKEN_SECRET}" "${GITHUB_OUTPUT}" <<'PY'
          import json
          import sys
          from pathlib import Path

          config_dir = Path(sys.argv[1])
          target_token_secret = sys.argv[2]
          github_output = Path(sys.argv[3])

          found = False
          for path in sorted(config_dir.glob("*.json")):
              data = json.loads(path.read_text(encoding="utf-8"))
              for namespace in data.get("namespaces", []):
                  source_url = namespace.get("source_group_url", "")
                  if isinstance(source_url, str) and source_url.startswith("https://github.com/"):
                      found = True

          secret_names = [
              "GL_BASE_URL",
              "GL_BRIDGE_FORK_USER_GLAB",
              target_token_secret,
          ]
          if found:
              secret_names.extend([
                  "GH_ORG_SHARED_APP_ID",
                  "GH_ORG_SHARED_APP_PEM",
              ])

          with github_output.open("a", encoding="utf-8") as handle:
              handle.write(f"secrets={','.join(secret_names)}\n")
              handle.write(
                  "needs-github-source-auth="
                  f"{'true' if found else 'false'}\n"
              )
          PY

      - name: Fetch target secrets from BWS
        uses: >-
          shared-common/gh-actions-shared/.github/actions/bws-fetch@v0.0.41
        with:
          access-token: ${{ secrets.BWS_ACCESS_TOKEN }}
          project-id: ${{ secrets.BWS_PROJECT_ID }}
          bws-version: ${{ inputs.bws-version }}
          bws-sha256: ${{ inputs.bws-sha256 }}
          secrets: ${{ steps.config_meta.outputs.secrets }}
          output-dir: .secrets

      - name: Mask fetched secrets
        shell: bash
        env:
          SECRET_NAMES: ${{ steps.config_meta.outputs.secrets }}
        run: |
          set -euo pipefail
          python3 shared/.github/scripts/mask_secret_files.py

      - name: Build deterministic plan
        shell: bash
        env:
          GL_TARGET_TOKEN_SECRET_NAME: ${{ inputs.target-token-secret }}
        run: |
          set -euo pipefail
          perl shared/.github/scripts/glab_groups.pl \
            plan \
            --config-dir "gh-actions-cfg/${{ inputs.config-path }}" \
            --batch-size "${{ inputs.batch-size }}" \
            --output plan.json \
            --summary plan.md

      - name: Build mirror batch matrix
        id: batch_matrix
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY' >> "${GITHUB_OUTPUT}"
          import json
          from pathlib import Path

          plan = json.loads(Path("plan.json").read_text(encoding="utf-8"))
          total_batches = int(plan.get("total_batches", 0))
          batch_size = int(plan.get("batch_size", 0))
          if batch_size < 1:
              raise SystemExit("plan batch_size must be greater than zero")
          if total_batches < 0:
              raise SystemExit("plan total_batches must not be negative")
          max_matrix_jobs = 256
          job_count = min(max(total_batches, 1), max_matrix_jobs)
          include = [
              {
                  "shard_index": index,
                  "batch_start": index,
                  "batch_stride": job_count,
                  "batch_limit": 0,
              }
              for index in range(job_count)
          ]
          matrix = json.dumps({"include": include}, separators=(",", ":"))
          print(f"matrix={matrix}")
          PY

      - name: Upload plan artifact
        # actions/upload-artifact v6.0.0
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: glab-groups-plan-${{ github.run_id }}
          if-no-files-found: error
          path: |
            plan.json

      - name: Cleanup secrets
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .secrets

  mirror:
    needs: plan
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    permissions:
      contents: read
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix: ${{ fromJSON(needs.plan.outputs.batch-matrix) }}
    steps:
      - name: Checkout shared workflow repository
        # actions/checkout v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: ${{ inputs.shared-repo }}
          ref: ${{ inputs.shared-ref }}
          path: shared
          persist-credentials: false

      - name: Download plan artifact
        # actions/download-artifact v7.0.0
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131
        with:
          name: glab-groups-plan-${{ github.run_id }}
          path: .

      - name: Resolve BWS secret list
        id: config_meta
        shell: bash
        env:
          NEEDS_GITHUB_SOURCE_AUTH: ${{ needs.plan.outputs.needs-github-source-auth }}
          TARGET_TOKEN_SECRET: ${{ inputs.target-token-secret }}
        run: |
          set -euo pipefail
          secret_list="GL_BASE_URL,GL_BRIDGE_FORK_USER_GLAB"
          secret_list="${secret_list},${TARGET_TOKEN_SECRET}"
          if [ "${NEEDS_GITHUB_SOURCE_AUTH}" = "true" ]; then
            secret_list="${secret_list},GH_ORG_SHARED_APP_ID,GH_ORG_SHARED_APP_PEM"
          fi
          printf 'secrets=%s\n' "${secret_list}" >> "${GITHUB_OUTPUT}"

      - name: Fetch target secrets from BWS
        uses: >-
          shared-common/gh-actions-shared/.github/actions/bws-fetch@v0.0.41
        with:
          access-token: ${{ secrets.BWS_ACCESS_TOKEN }}
          project-id: ${{ secrets.BWS_PROJECT_ID }}
          bws-version: ${{ inputs.bws-version }}
          bws-sha256: ${{ inputs.bws-sha256 }}
          secrets: ${{ steps.config_meta.outputs.secrets }}
          output-dir: .secrets

      - name: Mask fetched secrets
        shell: bash
        env:
          SECRET_NAMES: ${{ steps.config_meta.outputs.secrets }}
        run: |
          set -euo pipefail
          python3 shared/.github/scripts/mask_secret_files.py

      - name: Mirror selected repositories for batch
        shell: bash
        env:
          GL_TARGET_TOKEN_SECRET_NAME: ${{ inputs.target-token-secret }}
        run: |
          set -euo pipefail
          perl shared/.github/scripts/glab_groups.pl \
            mirror \
            --plan plan.json \
            --batch-size "${{ inputs.batch-size }}" \
            --batch-start "${{ matrix.batch_start }}" \
            --batch-stride "${{ matrix.batch_stride }}" \
            --batch-limit "${{ matrix.batch_limit }}" \
            --output "results-${{ matrix.shard_index }}.json" \
            --jsonl "results-${{ matrix.shard_index }}.jsonl"

      - name: Upload batch result artifacts
        # actions/upload-artifact v6.0.0
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: glab-results-${{ matrix.shard_index }}-${{ github.run_id }}
          if-no-files-found: error
          path: |
            results-${{ matrix.shard_index }}.json
            results-${{ matrix.shard_index }}.jsonl

      - name: Cleanup secrets
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .secrets

  report:
    needs: [plan, mirror]
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - name: Checkout shared workflow repository
        # actions/checkout v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: ${{ inputs.shared-repo }}
          ref: ${{ inputs.shared-ref }}
          path: shared
          persist-credentials: false

      - name: Download plan artifact
        # actions/download-artifact v7.0.0
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131
        with:
          name: glab-groups-plan-${{ github.run_id }}
          path: .

      - name: Download batch result artifacts
        # actions/download-artifact v7.0.0
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131
        with:
          pattern: glab-results-*-${{ github.run_id }}
          path: results-artifacts
          merge-multiple: true

      - name: Build report
        shell: bash
        run: |
          set -euo pipefail
          results_args=()
          shopt -s nullglob
          for file in results-artifacts/results-*.json; do
            results_args+=(--results "${file}")
          done
          if [ "${#results_args[@]}" -eq 0 ]; then
            printf '%s\n' "no batch result JSON files found" >&2
            exit 1
          fi
          perl shared/.github/scripts/glab_groups.pl \
            report \
            --plan plan.json \
            "${results_args[@]}" \
            --output report.json \
            --summary report.md

      - name: Build analytics outputs
        shell: bash
        run: |
          set -euo pipefail
          jsonl_args=()
          shopt -s nullglob
          for file in results-artifacts/results-*.jsonl; do
            jsonl_args+=(--jsonl "${file}")
          done
          if [ "${#jsonl_args[@]}" -eq 0 ]; then
            printf '%s\n' "no batch result JSONL files found" >&2
            exit 1
          fi
          parquet_args=()
          if [ "${{ inputs.emit-parquet }}" = "true" ]; then
            parquet_args+=(--parquet results.parquet)
          fi
          python3 shared/.github/scripts/post_run_analytics.py \
            --report report.json \
            "${jsonl_args[@]}" \
            --csv results.csv \
            --json analytics.json \
            "${parquet_args[@]}"

      - name: Publish markdown summaries
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          MAX_SUMMARY_CHARS = 900_000
          import os

          MAX_SKIPPED_ITEMS = 50
          MAX_FAILED_ITEMS = 50

          def append_line(parts: list[str], line: str) -> None:
              parts.append(f"{line}\n")

          def append_items(parts: list[str], heading: str, items: list[dict], field: str, limit: int) -> None:
              selected = [item for item in items if isinstance(item, dict)]
              if not selected:
                  return
              append_line(parts, "")
              append_line(parts, f"### {heading}")
              for item in selected[:limit]:
                  target = item.get("target_full_path", "<unknown>")
                  detail = item.get(field) or item.get("error") or item.get("reason") or heading.lower()
                  append_line(parts, f"- `{target}`: {detail}")
              if len(selected) > limit:
                  append_line(parts, f"- _... {len(selected) - limit} additional entries omitted; see workflow artifacts for full JSON outputs._")

          plan = json.loads(Path("plan.json").read_text(encoding="utf-8"))
          report = json.loads(Path("report.json").read_text(encoding="utf-8"))

          plan_counts = plan.get("counts") or {}
          result_counts = report.get("result_counts") or {}
          results = report.get("results") or []
          skipped = [item for item in results if isinstance(item, dict) and (item.get("status") or "") == "skipped"]
          failed = [item for item in results if isinstance(item, dict) and (item.get("status") or "") == "failed"]

          parts: list[str] = []
          append_line(parts, "## Plan")
          append_line(parts, "")
          append_line(parts, f"- generated at: {plan.get('generated_at', '')}")
          append_line(parts, f"- total targets: {plan.get('total_targets', 0)}")
          append_line(parts, f"- batch size: {plan.get('batch_size', 0)}")
          append_line(parts, f"- total batches: {plan.get('total_batches', 0)}")
          append_line(parts, f"- create project: {plan_counts.get('create_project', 0)}")
          append_line(parts, f"- update project: {plan_counts.get('update_project', 0)}")
          append_line(parts, f"- mirror only: {plan_counts.get('mirror_only', 0)}")
          append_line(parts, f"- skip: {plan_counts.get('skip', 0)}")
          append_line(parts, f"- fail: {plan_counts.get('fail', 0)}")

          append_line(parts, "")
          append_line(parts, "## Report")
          append_line(parts, "")
          append_line(parts, f"- generated at: {report.get('generated_at', '')}")
          append_line(parts, f"- mirrored: {result_counts.get('mirrored', 0)}")
          append_line(parts, f"- created empty: {result_counts.get('created_empty', 0)}")
          append_line(parts, f"- updated empty: {result_counts.get('updated_empty', 0)}")
          append_line(parts, f"- skipped: {result_counts.get('skipped', 0)}")
          append_line(parts, f"- failed: {result_counts.get('failed', 0)}")

          append_items(parts, "Skipped", skipped, "reason", MAX_SKIPPED_ITEMS)
          append_items(parts, "Failed", failed, "error", MAX_FAILED_ITEMS)

          text = "".join(parts)
          if len(text) > MAX_SUMMARY_CHARS:
              text = text[:MAX_SUMMARY_CHARS]
              newline = text.rfind("\n")
              if newline > 0:
                  text = text[: newline + 1]
              text += "\n_... truncated in step summary; see workflow artifacts for full JSON outputs._\n"

          with Path(os.environ["GITHUB_STEP_SUMMARY"]).open("a", encoding="utf-8") as handle:
              handle.write(text)
          PY

      - name: Upload run artifacts
        # actions/upload-artifact v6.0.0
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: glab-groups-${{ inputs.config-path }}-${{ github.run_id }}
          if-no-files-found: error
          path: |
            plan.json
            results-artifacts/**
            report.json
            results.csv
            analytics.json
            results.parquet
